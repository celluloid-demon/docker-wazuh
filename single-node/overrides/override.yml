services:
  wazuh.manager:
    restart: unless-stopped
    ports:
      # Reference: https://documentation.wazuh.com/current/getting-started/architecture.html
      - "${WZ_AGENT_CONNECTION_PORT:-1514}:1514"  # Wazuh TCP - Agent connection service
      - "${WZ_AGENT_ENROLLMENT_PORT:-1515}:1515"  # Wazuh TCP - Agent enrollment service
      - "${WZ_MANAGER_SYSLOG_PORT:-514}:514/udp"  # Wazuh UDP - Wazuh Syslog collector (disabled by default)
      - "${WZ_MANAGER_API_PORT:-55000}:55000"     # Wazuh server (RESTful) API
    env_file:
      - ${WZ_MANAGER_SECRETS}
      - ${WZ_INDEXER_SECRETS}
    volumes:
      - ${VOLUMES}/wazuh_api_configuration:/var/ossec/api/configuration
      - ${VOLUMES}/wazuh_etc:/var/ossec/etc
      - ${VOLUMES}/wazuh_logs:/var/ossec/logs
      - ${VOLUMES}/wazuh_queue:/var/ossec/queue
      - ${VOLUMES}/wazuh_var_multigroups:/var/ossec/var/multigroups
      - ${VOLUMES}/wazuh_integrations:/var/ossec/integrations
      - ${VOLUMES}/wazuh_active_response:/var/ossec/active-response/bin
      - ${VOLUMES}/wazuh_agentless:/var/ossec/agentless
      - ${VOLUMES}/wazuh_wodles:/var/ossec/wodles
      - ${VOLUMES}/filebeat_etc:/etc/filebeat
      - ${VOLUMES}/filebeat_var:/var/lib/filebeat      
      - ${VOLUMES}/config/wazuh_indexer_ssl_certs/root-ca-manager.pem:/etc/ssl/root-ca.pem
      - ${VOLUMES}/config/wazuh_indexer_ssl_certs/wazuh.manager.pem:/etc/ssl/filebeat.pem
      - ${VOLUMES}/config/wazuh_indexer_ssl_certs/wazuh.manager-key.pem:/etc/ssl/filebeat.key
      - ${VOLUMES}/config/wazuh_cluster/wazuh_manager.conf:/wazuh-config-mount/etc/ossec.conf

  wazuh.indexer:
    restart: unless-stopped
    ports:
      - "${WZ_INDEXER_API_PORT:-9200}:9200" # Wazuh indexer (RESTful) API
    env_file:
      - ${WZ_INDEXER_SECRETS} # (not sure this is even necessary since the indexer doesn't use any environment variables for authentication, but just in case)
    volumes:
      - ${VOLUMES}/wazuh-indexer-data:/var/lib/wazuh-indexer
      - ${VOLUMES}/config/wazuh_indexer_ssl_certs/root-ca.pem:/usr/share/wazuh-indexer/config/certs/root-ca.pem
      - ${VOLUMES}/config/wazuh_indexer_ssl_certs/wazuh.indexer-key.pem:/usr/share/wazuh-indexer/config/certs/wazuh.indexer.key
      - ${VOLUMES}/config/wazuh_indexer_ssl_certs/wazuh.indexer.pem:/usr/share/wazuh-indexer/config/certs/wazuh.indexer.pem
      - ${VOLUMES}/config/wazuh_indexer_ssl_certs/admin.pem:/usr/share/wazuh-indexer/config/certs/admin.pem
      - ${VOLUMES}/config/wazuh_indexer_ssl_certs/admin-key.pem:/usr/share/wazuh-indexer/config/certs/admin-key.pem
      - ${VOLUMES}/config/wazuh_indexer/wazuh.indexer.yml:/usr/share/wazuh-indexer/config/opensearch.yml
      - ${VOLUMES}/config/wazuh_indexer/internal_users.yml:/usr/share/wazuh-indexer/config/opensearch-security/internal_users.yml

  wazuh.dashboard:
    restart: unless-stopped
    ports:
      - "${WZ_DASHBOARD_PORT_HTTPS:-443}:5601" # Wazuh dashboard HTTPS
    env_file:
      - ${WZ_MANAGER_SECRETS}
      - ${WZ_INDEXER_SECRETS}
      - ${WZ_DASHBOARD_SECRETS}
    volumes:
      - ${VOLUMES}/config/wazuh_indexer_ssl_certs/wazuh.dashboard.pem:/usr/share/wazuh-dashboard/certs/wazuh-dashboard.pem
      - ${VOLUMES}/config/wazuh_indexer_ssl_certs/wazuh.dashboard-key.pem:/usr/share/wazuh-dashboard/certs/wazuh-dashboard-key.pem
      - ${VOLUMES}/config/wazuh_indexer_ssl_certs/root-ca.pem:/usr/share/wazuh-dashboard/certs/root-ca.pem
      - ${VOLUMES}/config/wazuh_dashboard/opensearch_dashboards.yml:/usr/share/wazuh-dashboard/config/opensearch_dashboards.yml
      - ${VOLUMES}/config/wazuh_dashboard/wazuh.yml:/usr/share/wazuh-dashboard/data/wazuh/config/wazuh.yml
      - ${VOLUMES}/wazuh-dashboard-config:/usr/share/wazuh-dashboard/data/wazuh/config
      - ${VOLUMES}/wazuh-dashboard-custom:/usr/share/wazuh-dashboard/plugins/wazuh/public/assets/custom
